<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>King Tools — Online Toolkit</title>
<meta name="description" content="Free online tools for images, passwords, PDFs and more.">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<script type="module" src="js/auth.js"></script>
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <div class="logo">👑 King Tools</div>
  <button onclick="toggleTheme()">🌙</button>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>All Tools. One Place.</h1>
  <p>Fast, simple and powerful utilities</p>

  <input type="text" id="search" placeholder="Search tools..." onkeyup="searchTools()">
</section>

<!-- TOOLS -->
<section class="tools-grid" id="tools">

  <div class="card" data-name="image studio" onclick="openTool('tools/image-studio.html')">
    <h3>🖼 Image Studio</h3>
    <p>Edit images</p>
  </div>

  <div class="card" data-name="image compressor">
    <h3>📉 Image Compressor</h3>
    <p>Reduce size</p>
  </div>

  <div class="card" data-name="password generator" onclick="openTool('tools/password-generator.html')">
    <h3>🔐 Password Generator</h3>
    <p>Strong passwords</p>
  </div>

  <div class="card premium" data-name="ai text" onclick="handlePremium()">
    <h3>✍️ AI Text Generator</h3>
    <p>AI content</p>
  </div>

</section>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
  <div class="modal-box">
    <h2>Login</h2>
    <button onclick="googleLogin()">Google Login</button>
    <button onclick="closeLogin()">Close</button>
  </div>
</div>

<!-- PRO MODAL -->
<div id="premiumModal" class="modal">
  <div class="modal-box">
    <h2>Upgrade to Pro</h2>
    <button onclick="buyPro()">Upgrade</button>
    <button onclick="closePremium()">Close</button>
  </div>
</div>

<footer>
  <p>© King Tools</p>
</footer>

<script src="js/app.js"></script>
<script src="js/pro.js"></script>
<script type="module" src="js/auth.js"></script>
</body>
</htm

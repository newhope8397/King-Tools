<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">
</head>
<body class="light">

<header>

  <h1 id="main-title">KingTools 👑</h1>
  <button id="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
</div>

<input type="text" id="searchBar" placeholder="Search tools..." onkeyup="searchTool()">
</header>

<section class="tool-categories" id="toolList">

<div class="tool">

<div class="tool">
<a href="tools/compress-pdf.html">
<img src="images/icons/compress.png" alt="Compress PDF">

<a href="tools/merge-pdf.html">

</a>
</div>

<div class="tool">

<footer>
<p>© 2026 KingTools 👑 | All rights reserved</p>
</footer>

<script src="js/script.js"></script>

<script>
// Search function
function searchTool() {
  let input = document.getElementById('searchBar').value.toLowerCase();
  let tools = document.getElementById('toolList').getElementsByClassName('tool');
  for (let i = 0; i < tools.length; i++) {
    let title = tools[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
    tools[i].style.display = title.includes(input) ? "" : "none";
  }
}

// Theme toggle
function toggleTheme() {
  const body = document.body;
  body.classList.toggle("dark");
  if(body.classList.contains("dark")){
    document.getElementById('theme-toggle').innerText = "☀️ Light Mode";
  } else {
    document.getElementById('theme-toggle').innerText = "🌙 Dark Mode";
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Studio SaaS - King Tools</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
:root{
--bg:#0f172a;
--card:rgba(255,255,255,0.05);
--accent:#7c3aed;
--text:#fff;
}

body{
margin:0;
font-family:sans-serif;
background:var(--bg);
color:var(--text);
}

/* Header */
header{
display:flex;
justify-content:space-between;
padding:15px;
background:rgba(0,0,0,0.3);
}

button{
background:var(--accent);
border:none;
padding:8px 12px;
color:#fff;
border-radius:8px;
cursor:pointer;
margin:3px;
}

/* Layout */
.main{
display:flex;
flex-wrap:wrap;
}

.editor{
flex:2;
padding:20px;
}

.panel{
flex:1;
background:var(--card);
padding:15px;
}

/* Canvas */
.canvas-box{
width:320px;
height:320px;
background:#000;
margin:auto;
position:relative;
overflow:hidden;
border-radius:10px;
}

canvas{
position:absolute;
cursor:grab;
}

.crop{
border:2px dashed #fff;
position:absolute;
display:none;
}
</style>
</head>

<body>

<header>
<div>👑 King Tools - Image Studio</div>
<div>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<span id="user">Guest</span>
</div>
</header>

<div style="text-align:center;margin:10px;">
<input type="file" id="upload">
</div>

<div class="main">

<div class="editor">
<div class="canvas-box" id="box">
<canvas id="canvas"></canvas>
<div id="cropBox" class="crop"></div>
</div>
</div>

<div class="panel">

<h3>Tools</h3>

<button onclick="rotate()">Rotate</button>
<button onclick="startCrop()">Crop</button>
<button onclick="applyCrop()">Apply Crop</button>

<br>

Zoom <input type="range" min="0.5" max="2" step="0.1" value="1" onchange="zoom(this.value)">

<br>

Brightness <input type="range" min="0" max="200" value="100" oninput="setBrightness(this.value)">
Contrast <input type="range" min="0" max="200" value="100"   oninput="setContrast(this.value)">

<br>

Width <input type="number" id="w">
Height <input type="number" id="h">
<button onclick="resizeImg()">Resize</button>

<hr>

<h3>AI Tools</h3>
<button onclick="aiEnhance()">Auto Enhance</button>
<button onclick="aiCool()">Cool Filter</button>

<hr>

<h3>SaaS</h3>
<button onclick="saveProject()">Save</button>
<button onclick="loadProjects()">My Projects</button>

<div id="gallery"></div>

<hr>

<button onclick="download()">Download</button>

</div>

</div>
<script src="../js/image/core.js"></script>
<script src="../js/image/history.js"></script>
<script src="../js/image/drag.js"></script>
<script src="../js/image/crop.js"></script>
<script src="../js/image/tools.js"></script>
<script src="../js/image/main.js"></script>
</body>
</html>

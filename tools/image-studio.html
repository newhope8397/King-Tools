<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Studio - King Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #8b5cf6; /* Purple like Canva */
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #f8fafc;
            color: #1e2937;
            height: 100vh;
            overflow: hidden;
        }
        .top-bar {
            background: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            padding: 16px;
        }
        .canvas-box {
            width: 100%;
            max-width: 720px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            margin: 0 auto;
        }
        .bottom-panel {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 16px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            max-height: 52vh;
            overflow-y: auto;
        }
        .adjust-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .select-area {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .select-btn {
            padding: 8px 16px;
            border-radius: 9999px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            font-size: 13.5px;
            cursor: pointer;
        }
        .select-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .slider-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        .slider-label {
            font-size: 14px;
            width: 90px;
            flex-shrink: 0;
        }
        input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
        }
        .value-box {
            width: 48px;
            text-align: center;
            font-size: 14px;
            background: #f8fafc;
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            margin: 8px 0;
        }
        .auto-btn {
            background: var(--accent);
            color: white;
        }
        .bottom-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 12px 0;
            white-space: nowrap;
        }
        .bottom-tab {
            padding: 8px 18px;
            background: #f1f5f9;
            border-radius: 9999px;
            font-size: 13.5px;
            cursor: pointer;
        }
        .bottom-tab.active {
            background: var(--accent);
            color: white;
        }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="top-bar">
        <div style="display:flex;gap:16px;">
            <span onclick="history.back()" style="cursor:pointer;">✕</span>
            <span>←</span>
            <span>→</span>
        </div>
        <div style="font-weight:500;">Image Studio</div>
        <div style="display:flex;gap:16px;">
            <span>⬇</span>
            <span style="background:var(--accent);color:white;padding:4px 12px;border-radius:9999px;cursor:pointer;" onclick="downloadImage()">✓</span>
        </div>
    </div>

    <!-- Canvas -->
    <div class="canvas-container">
        <div class="canvas-box" id="canvasBox">
            <canvas id="canvas"></canvas>
            <div id="cropBox" style="position:absolute;border:3px dashed #8b5cf6;background:rgba(139,92,246,0.1);display:none;cursor:move;"></div>
        </div>
    </div>

    <!-- Bottom Panel - Canva Style -->
    <div class="bottom-panel">
        <div class="adjust-header">
            <span onclick="resetImage()" style="color:#8b5cf6;cursor:pointer;">Reset</span>
            <strong>Adjust</strong>
            <span style="cursor:pointer;" onclick="closePanel()">✕</span>
        </div>

        <!-- Select Area -->
        <div class="select-area">
            <div class="select-btn active">All</div>
            <div class="select-btn">Click</div>
            <div class="select-btn">Brush</div>
            <div class="select-btn">Foreground</div>
        </div>

        <!-- Sliders -->
        <div id="sliders">
            <!-- Dynamic sliders will be populated by JS for different options -->
        </div>

        <!-- Bottom quick tabs -->
        <div class="bottom-tabs" id="quickTabs">
            <div class="bottom-tab active" onclick="setAdjustMode(0)">Auto-adjust</div>
            <div class="bottom-tab" onclick="setAdjustMode(1)">Temperature</div>
            <div class="bottom-tab" onclick="setAdjustMode(2)">Tint</div>
            <div class="bottom-tab" onclick="setAdjustMode(3)">Brightness</div>
            <div class="bottom-tab" onclick="setAdjustMode(4)">Contrast</div>
            <div class="bottom-tab" onclick="setAdjustMode(5)">Highlights</div>
            <div class="bottom-tab" onclick="setAdjustMode(6)">Shadows</div>
            <div class="bottom-tab" onclick="setAdjustMode(7)">Whites</div>
            <div class="bottom-tab" onclick="setAdjustMode(8)">Blacks</div>
            <div class="bottom-tab" onclick="setAdjustMode(9)">Vibrance</div>
        </div>

        <button class="auto-btn" onclick="autoEnhance()">✨ Auto-adjust</button>
    </div>

</html>

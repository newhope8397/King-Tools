<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Studio SaaS - King Tools</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
:root{
--bg:#0f172a;
--card:rgba(255,255,255,0.05);
--accent:#7c3aed;
--text:#fff;
}

body{
margin:0;
font-family:sans-serif;
background:var(--bg);
color:var(--text);
}

/* Header */
header{
display:flex;
justify-content:space-between;
padding:15px;
background:rgba(0,0,0,0.3);
}

button{
background:var(--accent);
border:none;
padding:8px 12px;
color:#fff;
border-radius:8px;
cursor:pointer;
margin:3px;
}

/* Layout */
.main{
display:flex;
flex-wrap:wrap;
}

.editor{
flex:2;
padding:20px;
}

.panel{
flex:1;
background:var(--card);
padding:15px;
}

/* Canvas */
.canvas-box{
width:320px;
height:320px;
background:#000;
margin:auto;
position:relative;
overflow:hidden;
border-radius:10px;
}

canvas{
position:absolute;
cursor:grab;
}

.crop{
border:2px dashed #fff;
position:absolute;
display:none;
}
</style>
</head>

<body>

<header>
<div>👑 King Tools - Image Studio</div>
<div>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<span id="user">Guest</span>
</div>
</header>

<div style="text-align:center;margin:10px;">
<input type="file" id="upload">
</div>

<div class="main">

<div class="editor">
<div class="canvas-box" id="box">
<canvas id="canvas"></canvas>
<div id="cropBox" class="crop"></div>
</div>
</div>

<div class="panel">

<h3>Tools</h3>

<button onclick="rotate()">Rotate</button>
<button onclick="startCrop()">Crop</button>
<button onclick="applyCrop()">Apply Crop</button>

<br>

Zoom <input type="range" min="0.5" max="2" step="0.1" value="1" onchange="zoom(this.value)">

<br>

Brightness <input type="range" min="0" max="200" value="100" onchange="brightness=this.value;draw()">
Contrast <input type="range" min="0" max="200" value="100" onchange="contrast=this.value;draw()">

<br>

Width <input type="number" id="w">
Height <input type="number" id="h">
<button onclick="resizeImg()">Resize</button>

<hr>

<h3>AI Tools</h3>
<button onclick="aiEnhance()">Auto Enhance</button>
<button onclick="aiCool()">Cool Filter</button>

<hr>

<h3>SaaS</h3>
<button onclick="saveProject()">Save</button>
<button onclick="loadProjects()">My Projects</button>

<div id="gallery"></div>

<hr>

<button onclick="download()">Download</button>

</div>

</div>

<script>
// Firebase config (REPLACE)
const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* Auth */
function login(){
const provider = new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider);
}

function logout(){
auth.signOut();
}

auth.onAuthStateChanged(user=>{
document.getElementById("user").innerText =
user ? user.displayName : "Guest";
});

/* Canvas */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let img=new Image();
let angle=0,scale=1,posX=0,posY=0;
let brightness=100,contrast=100;

upload.onchange=e=>{
let r=new FileReader();
r.onload=ev=>img.src=ev.target.result;
r.readAsDataURL(e.target.files[0]);
};

img.onload=()=>{
canvas.width=300;
canvas.height=300;
draw();
};

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.save();
ctx.filter=`brightness(${brightness}%) contrast(${contrast}%)`;

ctx.translate(canvas.width/2+posX,canvas.height/2+posY);
ctx.rotate(angle*Math.PI/180);
ctx.scale(scale,scale);

ctx.drawImage(img,-img.width/2,-img.height/2);

ctx.restore();
}

function rotate(){angle+=90;draw();}
function zoom(v){scale=v;draw();}

/* Drag */
let drag=false;
canvas.onmousedown=()=>drag=true;
canvas.onmouseup=()=>drag=false;
canvas.onmousemove=e=>{
if(drag){
posX+=e.movementX;
posY+=e.movementY;
draw();
}
};

/* Crop */
let cropBox=document.getElementById("cropBox");
let box=document.getElementById("box");
let sx,sy;

function startCrop(){
cropBox.style.display="block";
}

box.onmousedown=e=>{
sx=e.offsetX;
sy=e.offsetY;
cropBox.style.left=sx+"px";
cropBox.style.top=sy+"px";
};

box.onmousemove=e=>{
if(cropBox.style.display==="block"){
cropBox.style.width=(e.offsetX-sx)+"px";
cropBox.style.height=(e.offsetY-sy)+"px";
}
};

function applyCrop(){
let x=parseInt(cropBox.style.left);
let y=parseInt(cropBox.style.top);
let w=parseInt(cropBox.style.width);
let h=parseInt(cropBox.style.height);

let data=ctx.getImageData(x,y,w,h);
canvas.width=w;
canvas.height=h;
ctx.putImageData(data,0,0);

cropBox.style.display="none";
}

/* Resize */
function resizeImg(){
canvas.width=w.value;
canvas.height=h.value;
draw();
}

/* AI */
function aiEnhance(){
brightness=120;
contrast=120;
draw();
}

function aiCool(){
brightness=110;
contrast=130;
draw();
}

/* SaaS Save */
function saveProject(){
let user=auth.currentUser;
if(!user)return alert("Login first");

db.collection("projects").add({
uid:user.uid,
img:canvas.toDataURL()
});

alert("Saved!");
}

/* Load */
function loadProjects(){
let user=auth.currentUser;
if(!user)return;

db.collection("projects")
.where("uid","==",user.uid)
.get()
.then(snap=>{
let html="";
snap.forEach(doc=>{
html+=`<img src="${doc.data().img}" width="80">`;
});
gallery.innerHTML=html;
});
}

/* Download */
function download(){
let a=document.createElement("a");
a.download="image.png";
a.href=canvas.toDataURL();
a.click();
}
</script>

</body>
</html>

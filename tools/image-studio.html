<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Studio - King Tools</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* HEADER */

header{
background:#1e293b;
padding:15px 30px;
font-size:22px;
font-weight:bold;
}

/* MAIN LAYOUT */

.container{
display:flex;
height:80vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#1e293b;
padding:20px;
}

.sidebar h3{
margin-top:0;
}

.sidebar button{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
background:#38bdf8;
color:white;
cursor:pointer;
font-size:14px;
}

.sidebar button:hover{
background:#0ea5e9;
}

/* EDITOR */

.editor{
flex:1;
padding:30px;
text-align:center;
}

canvas{
max-width:100%;
background:#111;
border-radius:10px;
}

/* UPLOAD */

.upload{
margin-bottom:20px;
}

/* DOWNLOAD BUTTON */

.download{
margin-top:20px;
padding:12px 22px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<header>
Image Studio 👑
</header>

<div class="container">

<div class="sidebar">

<h3>Tools</h3>

<button onclick="resizeImage()">🖼 Resize</button>
<button onclick="cropImage()">✂ Crop</button>
<button onclick="rotateImage()">🔄 Rotate</button>
<button onclick="compressImage()">📦 Compress</button>
<button onclick="convertImage()">🔁 Convert</button>
<button onclick="addWatermark()">💧 Watermark</button>

</div>

<div class="editor">

<div class="upload">

<input type="file" id="upload">

</div>

<canvas id="canvas"></canvas>

<br>

<button class="download" onclick="download()">Download Image</button>

</div>

</div>

<script>

let img = new Image()

let canvas = document.getElementById("canvas")

let ctx = canvas.getContext("2d")

document.getElementById("upload").addEventListener("change",function(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(event){

img.src=event.target.result

}

reader.readAsDataURL(file)

})

img.onload=function(){

canvas.width=img.width

canvas.height=img.height

ctx.drawImage(img,0,0)

}

function resizeImage(){

canvas.width=img.width/2

canvas.height=img.height/2

ctx.drawImage(img,0,0,canvas.width,canvas.height)

}

function cropImage(){

ctx.drawImage(img,50,50,canvas.width-100,canvas.height-100,0,0,canvas.width-100,canvas.height-100)

}

function rotateImage(){

canvas.width=img.height

canvas.height=img.width

ctx.rotate(90*Math.PI/180)

ctx.drawImage(img,0,-img.height)

}

function compressImage(){

let data=canvas.toDataURL("image/jpeg",0.5)

img.src=data

}

function convertImage(){

let data=canvas.toDataURL("image/png")

img.src=data

}

function addWatermark(){

ctx.font="30px Arial"

ctx.fillStyle="white"

ctx.fillText("King Tools",20,40)

}

function download(){

let link=document.createElement("a")

link.download="image.png"

link.href=canvas.toDataURL()

link.click()

}

</script>

</body>
</html>

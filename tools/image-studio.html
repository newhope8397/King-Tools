<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Studio - King Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass: rgba(255,255,255,0.08);
            --glass-border: rgba(255,255,255,0.15);
            --neon: #67e8f9;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0f23, #1a1a2e);
            color: white;
            margin: 0;
            padding: 0;
        }

        .nav {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        .logo { font-size: 24px; font-weight: 600; }

        .main {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .canvas-box {
            width: 100%;
            max-width: 700px;
            height: 480px;
            background: #000;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 100%;
            max-height: 100%;
            cursor: grab;
        }

        .panel {
            background: var(--glass);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
        }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: var(--neon);
            color: black;
            font-weight: 600;
        }

        button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            background: rgba(103, 232, 249, 0.15);
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: rgba(103, 232, 249, 0.3);
        }

        .slider {
            width: 100%;
            margin: 12px 0;
        }

        .crop-box {
            position: absolute;
            border: 2px dashed var(--neon);
            background: rgba(103, 232, 249, 0.1);
            pointer-events: none;
        }

        .resize-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }

        .size-btn {
            padding: 12px 8px;
            font-size: 13px;
            background: rgba(255,255,255,0.1);
        }

        @media (min-width: 992px) {
            .main {
                flex-direction: row;
            }
            .editor { flex: 2; }
            .panel { flex: 1; min-width: 320px; }
        }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="logo">👑 King Tools</div>
        <div>
            <button onclick="window.location.href='../index.html'">Home</button>
            <button onclick="toggleTheme()">🌙</button>
        </div>
    </nav>

    <div class="main">
        <!-- Editor -->
        <div class="editor">
            <div class="canvas-box" id="canvasBox">
                <canvas id="canvas"></canvas>
                <div id="cropBox" class="crop-box"></div>
            </div>

            <div style="text-align:center; margin-top: 15px;">
                <input type="file" id="upload" accept="image/*">
                <button onclick="downloadImage()">📥 Download Edited Image</button>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="panel">
            <h3>🖼️ Image Editor</h3>

            <!-- Tabs -->
            <div class="tabs">
                <div class="tab active" onclick="switchTab(0)">Basic</div>
                <div class="tab" onclick="switchTab(1)">Adjust</div>
                <div class="tab" onclick="switchTab(2)">Resize</div>
                <div class="tab" onclick="switchTab(3)">Crop</div>
            </div>

            <!-- Basic Tab -->
            <div id="tab0" class="tab-content">
                <button onclick="rotateImage()">↻ Rotate 90°</button>
                <button onclick="undo()">↩️ Undo Last Change</button>
                <button onclick="resetImage()">🔄 Reset to Original</button>
            </div>

            <!-- Adjust Tab -->
            <div id="tab1" class="tab-content" style="display:none;">
                <h4>Zoom</h4>
                <input type="range" id="zoomSlider" min="0.5" max="4" step="0.1" value="1" class="slider" oninput="zoomImage(this.value)">

                <h4>Brightness</h4>
                <input type="range" id="brightnessSlider" min="50" max="150" value="100" class="slider" oninput="setBrightness(this.value)">

                <h4>Contrast</h4>
                <input type="range" id="contrastSlider" min="50" max="150" value="100" class="slider" oninput="setContrast(this.value)">

                <button onclick="autoEnhance()">✨ Auto Enhance</button>
                <button onclick="coolFilter()">❄️ Cool Tone</button>
            </div>

            <!-- Resize Tab -->
            <div id="tab2" class="tab-content" style="display:none;">
                <h4>Quick Sizes</h4>
                <div class="resize-options">
                    <button class="size-btn" onclick="quickResize(800,600)">HD (800×600)</button>
                    <button class="size-btn" onclick="quickResize(1200,800)">1200×800</button>
                    <button class="size-btn" onclick="quickResize(1920,1080)">Full HD</button>
                    <button class="size-btn" onclick="quickResize(1080,1080)">Square 1080</button>
                </div>

                <h4>Scale by Percentage</h4>
                <input type="range" id="percentSlider" min="10" max="200" value="100" class="slider" oninput="resizeByPercent(this.value)">
                <p style="text-align:center; margin:5px 0;" id="percentValue">100%</p>

                <button onclick="applyPercentageResize()">Apply Scale</button>
            </div>

            <!-- Crop Tab -->
            <div id="tab3" class="tab-content" style="display:none;">
                <button onclick="startCropMode()">✂️ Start Cropping</button>
                <button onclick="applyCrop()">✅ Apply Crop</button>
                <button onclick="cancelCrop()">❌ Cancel Crop</button>
                <p style="font-size:13px; opacity:0.8; margin-top:10px;">
                    Tip: Click and drag on the image to select area
                </p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        const cropBox = document.getElementById("cropBox");

        let originalImage = null;
        let currentImage = null;
        let scale = 1;
        let zoomLevel = 1;
        let brightness = 100;
        let contrast = 100;
        let offsetX = 0, offsetY = 0;

        // Crop variables
        let isCropping = false;
        let cropStartX = 0, cropStartY = 0;
        let cropEndX = 0, cropEndY = 0;
        let isDraggingCrop = false;

        let historyStack = [];

        // Tab switching
        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach((el, i) => {
                el.style.display = i === n ? 'block' : 'none';
            });
            document.querySelectorAll('.tab').forEach((el, i) => {
                el.classList.toggle('active', i === n);
            });
        }

        // Load Image
        document.getElementById("upload").addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const img = new Image();
            img.src = URL.createObjectURL(file);

            img.onload = () => {
                originalImage = img;
                currentImage = img;
                resetCanvas();
                renderImage();
                saveToHistory();
            };
        });

        function resetCanvas() {
            const box = document.getElementById("canvasBox");
            const ratio = Math.min(box.clientWidth * 0.9 / originalImage.width, 
                                 box.clientHeight * 0.9 / originalImage.height);
            
            canvas.width = originalImage.width * ratio;
            canvas.height = originalImage.height * ratio;
            scale = ratio;
            zoomLevel = 1;
            offsetX = offsetY = 0;
            brightness = contrast = 100;

            document.getElementById("zoomSlider").value = 1;
            document.getElementById("brightnessSlider").value = 100;
            document.getElementById("contrastSlider").value = 100;
            document.getElementById("percentSlider").value = 100;
            document.getElementById("percentValue").textContent = "100%";
        }

        function renderImage() {
            if (!originalImage) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const w = originalImage.width * scale * zoomLevel;
            const h = originalImage.height * scale * zoomLevel;
            const x = (canvas.width - w) / 2 + offsetX;
            const y = (canvas.height - h) / 2 + offsetY;

            ctx.save();
            ctx.filter = `brightness(\( {brightness}%) contrast( \){contrast}%)`;
            ctx.drawImage(originalImage, x, y, w, h);
            ctx.restore();
        }

        // ====================== BASIC ======================
        function rotateImage() {
            if (!originalImage) return;
            const tempCanvas = document.createElement("canvas");
            const tempCtx = tempCanvas.getContext("2d");

            tempCanvas.width = originalImage.height;
            tempCanvas.height = originalImage.width;

            tempCtx.translate(tempCanvas.width/2, tempCanvas.height/2);
            tempCtx.rotate(Math.PI/2);
            tempCtx.drawImage(originalImage, -originalImage.width/2, -originalImage.height/2);

            const newImg = new Image();
            newImg.src = tempCanvas.toDataURL();
            newImg.onload = () => {
                originalImage = newImg;
                resetCanvas();
                renderImage();
                saveToHistory();
            };
        }

        function resetImage() {
            if (!originalImage) return;
            resetCanvas();
            renderImage();
        }

        // ====================== ADJUST ======================
        function zoomImage(val) {
            zoomLevel = parseFloat(val);
            renderImage();
        }

        function setBrightness(val) {
            brightness = parseFloat(val);
            renderImage();
        }

        function setContrast(val) {
            contrast = parseFloat(val);
            renderImage();
        }

        function autoEnhance() {
            brightness = 115; contrast = 118;
            document.getElementById("brightnessSlider").value = 115;
            document.getElementById("contrastSlider").value = 118;
            renderImage();
        }

        function coolFilter() {
            brightness = 95; contrast = 112;
            document.getElementById("brightnessSlider").value = 95;
            document.getElementById("contrastSlider").value = 112;
            renderImage();
        }

        // ====================== RESIZE ======================
        function quickResize(w, h) {
            if (!originalImage) return;
            const tempCanvas = document.createElement("canvas");
            const tempCtx = tempCanvas.getContext("2d");
            tempCanvas.width = w;
            tempCanvas.height = h;

            tempCtx.drawImage(originalImage, 0, 0, w, h);

            const newImg = new Image();
            newImg.src = tempCanvas.toDataURL();
            newImg.onload = () => {
                originalImage = newImg;
                resetCanvas();
                renderImage();
                saveToHistory();
            };
        }

        function resizeByPercent(val) {
            document.getElementById("percentValue").textContent = val + "%";
        }

        function applyPercentageResize() {
            const percent = parseFloat(document.getElementById("percentSlider").value) / 100;
            if (!originalImage || percent === 1) return;

            const newW = Math.round(originalImage.width * percent);
            const newH = Math.round(originalImage.height * percent);

            quickResize(newW, newH);
        }

        // ====================== CROP ======================
        function startCropMode() {
            if (!originalImage) return;
            isCropping = true;
            cropBox.style.display = "block";
            cropBox.style.left = "20%";
            cropBox.style.top = "20%";
            cropBox.style.width = "60%";
            cropBox.style.height = "60%";
            
            alert("Now drag inside the image to select crop area");
        }

        function applyCrop() {
            if (!isCropping) return;

            const rect = cropBox.getBoundingClientRect();
            const canvasRect = canvas.getBoundingClientRect();

            const cropX = (rect.left - canvasRect.left) / scale / zoomLevel;
            const cropY = (rect.top - canvasRect.top) / scale / zoomLevel;
            const cropW = rect.width / scale / zoomLevel;
            const cropH = rect.height / scale / zoomLevel;

            const tempCanvas = document.createElement("canvas");
            const tempCtx = tempCanvas.getContext("2d");
            tempCanvas.width = cropW;
            tempCanvas.height = cropH;

            tempCtx.drawImage(originalImage, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

            const newImg = new Image();
            newImg.src = tempCanvas.toDataURL();
            newImg.onload = () => {
                originalImage = newImg;
                resetCanvas();
                renderImage();
                saveToHistory();
                cancelCrop();
            };
        }

        function cancelCrop() {
            isCropping = false;
            cropBox.style.display = "none";
        }

        // ====================== DOWNLOAD & UNDO ======================
        function downloadImage() {
            const link = document.createElement("a");
            link.download = "edited-image.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        function saveToHistory() {
            historyStack.push(canvas.toDataURL());
            if (historyStack.length > 20) historyStack.shift();
        }

        function undo() {
            if (historyStack.length < 2) return;
            historyStack.pop();
            const previous = historyStack[historyStack.length - 1];

            const img = new Image();
            img.src = previous;
            img.onload = () => {
                originalImage = img;
                renderImage();
            };
        }

        // Drag to pan when zoomed
        let isDragging = false, startX, startY;
        canvas.addEventListener("mousedown", (e) => {
            if (zoomLevel > 1) {
                isDragging = true;
                startX = e.offsetX;
                startY = e.offsetY;
            }
        });

        canvas.addEventListener("mousemove", (e) => {
            if (isDragging) {
                offsetX += e.offsetX - startX;
                offsetY += e.offsetY - startY;
                startX = e.offsetX;
                startY = e.offsetY;
                renderImage();
            }
        });

        canvas.addEventListener("mouseup", () => isDragging = false);

        // Keyboard
        document.addEventListener("keydown", e => {
            if (e.ctrlKey && e.key === "z") undo();
        });

        window.onload = () => {
            console.log("✅ King Tools Image Studio v2 Loaded!");
            switchTab(0); // Start with Basic tab
        };
    </script>
</body>
</html>

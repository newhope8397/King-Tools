<body>

<header>
Image Studio 👑
</header>

<div class="container">

<div class="sidebar">

<h3>Tools</h3>

<button onclick="resizeImage()">🖼 Resize</button>
<button onclick="cropImage()">✂ Crop</button>
<button onclick="rotateImage()">🔄 Rotate</button>
<button onclick="compressImage()">📦 Compress</button>
<button onclick="convertImage()">🔁 Convert</button>
<button onclick="addWatermark()">💧 Watermark</button>

</div>

<div class="editor">

<div class="upload">

<input type="file" id="upload">

</div>

<canvas id="canvas"></canvas>

<br>

<button class="download" onclick="download()">Download Image</button>

</div>

</div>

<script>

let img = new Image()

let canvas = document.getElementById("canvas")

let ctx = canvas.getContext("2d")

document.getElementById("upload").addEventListener("change",function(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(event){

img.src=event.target.result

}

reader.readAsDataURL(file)

})

img.onload=function(){

canvas.width=img.width

canvas.height=img.height

ctx.drawImage(img,0,0)

}

function resizeImage(){

canvas.width=img.width/2

canvas.height=img.height/2

ctx.drawImage(img,0,0,canvas.width,canvas.height)

}

function cropImage(){

ctx.drawImage(img,50,50,canvas.width-100,canvas.height-100,0,0,canvas.width-100,canvas.height-100)

}

function rotateImage(){

canvas.width=img.height

canvas.height=img.width

ctx.rotate(90*Math.PI/180)

ctx.drawImage(img,0,-img.height)

}

function compressImage(){

let data=canvas.toDataURL("image/jpeg",0.5)

img.src=data

}

function convertImage(){

let data=canvas.toDataURL("image/png")

img.src=data

}

function addWatermark(){

ctx.font="30px Arial"

ctx.fillStyle="white"

ctx.fillText("King Tools",20,40)

}

function download(){

let link=document.createElement("a")

link.download="image.png"

link.href=canvas.toDataURL()

link.click()

}


// ===== Image Studio JS =====

let img = new Image();
let originalImg = null;
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

// Upload Image
document.getElementById("upload").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(event){
    img.src = event.target.result;
  }
  reader.readAsDataURL(file);
});

// When image loads
img.onload = function(){
  canvas.width = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);
  originalImg = new Image();
  originalImg.src = canvas.toDataURL(); // save original for reset
}

// ===== Resize =====
function resizeImage(){
  canvas.width = img.width / 2;
  canvas.height = img.height / 2;
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  img.src = canvas.toDataURL();
}

// ===== Crop =====
function cropImage(){
  // Auto square crop (centered)
  const size = Math.min(canvas.width, canvas.height);
  const sx = (canvas.width - size) / 2;
  const sy = (canvas.height - size) / 2;
  const imageData = ctx.getImageData(sx, sy, size, size);
  canvas.width = size;
  canvas.height = size;
  ctx.putImageData(imageData, 0, 0);
  img.src = canvas.toDataURL();
}

// ===== Rotate =====
let rotation = 0;
function rotateImage(){
  rotation += 90;
  rotation = rotation % 360;
  const offCanvas = document.createElement("canvas");
  const offCtx = offCanvas.getContext("2d");

  if(rotation % 180 === 0){
    offCanvas.width = img.width;
    offCanvas.height = img.height;
  } else {
    offCanvas.width = img.height;
    offCanvas.height = img.width;
  }

  offCtx.save();
  offCtx.translate(offCanvas.width/2, offCanvas.height/2);
  offCtx.rotate(rotation * Math.PI / 180);
  offCtx.drawImage(img, -img.width/2, -img.height/2);
  offCtx.restore();

  canvas.width = offCanvas.width;
  canvas.height = offCanvas.height;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(offCanvas,0,0);
  img.src = canvas.toDataURL();
}

// ===== Compress =====
function compressImage(){
  const data = canvas.toDataURL("image/jpeg",0.5);
  img.src = data;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const temp = new Image();
  temp.onload = ()=> ctx.drawImage(temp,0,0);
  temp.src = data;
}

// ===== Convert =====
function convertImage(format="png"){
  const data = canvas.toDataURL("image/" + format);
  img.src = data;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const temp = new Image();
  temp.onload = ()=> ctx.drawImage(temp,0,0);
  temp.src = data;
}

// ===== Watermark =====
function addWatermark(text="♛ K ing Tools", x=10, y=30, size=30, color="rgba(255,255,255,0.7)"){
  ctx.font = size + "px Arial";
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  img.src = canvas.toDataURL();
}

// ===== Download =====
function download(){
  const link = document.createElement("a");
  link.download = "image.png";
  link.href = canvas.toDataURL();
  link.click();
}

// ===== Reset Image =====
function resetImage(){
  if(originalImg){
    img.src = originalImg.src;
    img.onload = function(){
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img,0,0);
      rotation = 0;
    }
  }
}
</script>
</body>

<!DOCTYPE html>
<html>
<head>
<title>Password Generator - KingTools</title>
<style>
body{
font-family: Arial;
text-align:center;
background:#111;
color:white;
padding-top:100px;
}

input{
padding:10px;
width:250px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

a{
display:block;
margin-top:30px;
color:#00c3ff;
}
</style>
</head>

<body>

<h1>Password Generator</h1>

<input type="text" id="password" placeholder="Your password will appear here">

<br>

<button onclick="generatePassword()">Generate Password</button>

<br>

<a href="index.html">⬅ Back to Home</a>

<script>

function generatePassword(){

let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&";

let password="";

for(let i=0;i<12;i++){

password+=chars.charAt(Math.floor(Math.random()*chars.length));

}

document.getElementById("password").value=password;

}

</script>

</body>
</html>

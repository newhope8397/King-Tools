<!DOCTYPE html>
<html>
<head>

<title>Password Generator - KingTools</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:30px;
}

section{
margin-top:40px;
padding:20px;
background:#1b1b1b;
border-radius:8px;
}

input,select{
padding:10px;
margin:6px;
font-size:15px;
}

button{
padding:8px 16px;
margin:6px;
cursor:pointer;
}

#password{
width:260px;
font-size:18px;
}

#strengthContainer{
width:260px;
height:10px;
background:#333;
margin:10px auto;
border-radius:5px;
}

#strengthBar{
height:10px;
width:0%;
background:red;
border-radius:5px;
transition:0.3s;
}

#history{
max-width:450px;
margin:auto;
background:#222;
padding:10px;
border-radius:6px;
}

.history-item{
display:flex;
justify-content:space-between;
padding:6px;
border-bottom:1px solid #444;
}

</style>

</head>

<body>

<h1>KingTools Password Generator</h1>

<!-- FUN PASSWORD -->

<section>

<h2>🎲 Fun Password Generator</h2>

<select id="funType">

<option value="science">Science</option>
<option value="history">History</option>
<option value="celebrity">Celebrities & Cricketers</option>
<option value="rhymes">Rhyming Words</option>

</select>

<button onclick="generateFun()">Generate Fun Password</button>

<p>Rating ⭐⭐⭐ Fun | ⭐⭐ Security</p>

</section>


<!-- HACKER STYLE -->

<section>

<h2>🕶 Hacker Style Password</h2>

<input id="hackerInput" placeholder="Enter word">

<button onclick="hackerConvert()">Convert</button>

<br>

<input id="hackerOutput" placeholder="Hacker password">

</section>


<!-- AI STYLE -->

<section>

<h2>🤖 AI Password Idea</h2>

<input id="themeInput" placeholder="Enter theme (space, fire, tech)">

<button onclick="aiGenerate()">Generate</button>

</section>


<!-- MAIN PASSWORD -->

<section>

<h2>🔐 Password Generator</h2>

<select id="strengthSelect">

<option value="weak">Weak</option>
<option value="medium">Medium</option>
<option value="strong">Strong</option>

</select>

<br>

<label><input type="checkbox" id="uppercase" checked>Uppercase</label>

<label><input type="checkbox" id="numbers" checked>Numbers</label>

<label><input type="checkbox" id="symbols" checked>Symbols</label>

<label><input type="checkbox" id="avoidSimilar">Avoid Similar</label>

<br>

<button onclick="generatePassword()">Generate</button>

<br>

<input type="password" id="password">

<br>

<button onclick="togglePassword()">Show / Hide</button>

<button onclick="copyPassword()">Copy</button>

<div id="strengthContainer">
<div id="strengthBar"></div>
</div>

</section>


<!-- HISTORY -->

<section>

<h2>📋 Password History</h2>

<div id="history"></div>

</section>


<script>

function randomChar(chars){
return chars[Math.floor(Math.random()*chars.length)];
}


function generatePassword(){

let strength=document.getElementById("strengthSelect").value;

let length=10;

if(strength==="weak") length=6;
if(strength==="medium") length=10;
if(strength==="strong") length=16;

let chars="abcdefghijklmnopqrstuvwxyz";

if(document.getElementById("uppercase").checked)
chars+="ABCDEFGHIJKLMNOPQRSTUVWXYZ";

if(document.getElementById("numbers").checked)
chars+="0123456789";

if(document.getElementById("symbols").checked)
chars+="@#$%&*!?";

if(document.getElementById("avoidSimilar").checked)
chars=chars.replace(/[O0Il1]/g,"");

let password="";

for(let i=0;i<length;i++)
password+=randomChar(chars);

document.getElementById("password").value=password;

updateStrength(password);

addHistory(password);

}



function updateStrength(pass){

let score=0;

if(pass.length>8) score++;
if(/[A-Z]/.test(pass)) score++;
if(/[0-9]/.test(pass)) score++;
if(/[@#$%&*!?]/.test(pass)) score++;
if(pass.length>14) score++;

let bar=document.getElementById("strengthBar");

bar.style.width=(score*20)+"%";

if(score<=2)
bar.style.background="red";

else if(score<=4)
bar.style.background="orange";

else
bar.style.background="lime";

}



function copyPassword(){

let pass=document.getElementById("password");

navigator.clipboard.writeText(pass.value);

alert("Password copied");

}



function togglePassword(){

let pass=document.getElementById("password");

pass.type=pass.type==="password"?"text":"password";

}



function addHistory(password){

let history=document.getElementById("history");

let item=document.createElement("div");

item.className="history-item";

let text=document.createElement("span");

text.innerText=password;

let btn=document.createElement("button");

btn.innerText="Copy";

btn.onclick=function(){
navigator.clipboard.writeText(password);
};

item.appendChild(text);
item.appendChild(btn);

history.prepend(item);

}



function hackerConvert(){

let t=document.getElementById("hackerInput").value;

let r=t.replace(/a/gi,"@")
.replace(/s/gi,"$")
.replace(/o/gi,"0")
.replace(/i/gi,"!")
.replace(/e/gi,"3")
.replace(/t/gi,"7");

document.getElementById("hackerOutput").value=r;

addHistory(r);

}



function aiGenerate(){

let theme=document.getElementById("themeInput").value;

let words=["rocket","nova","storm","tiger","dragon","quantum","shadow","galaxy","phoenix","cosmic"];

let word=words[Math.floor(Math.random()*words.length)];

let pass=theme+word+Math.floor(Math.random()*100);

document.getElementById("password").value=pass;

addHistory(pass);

updateStrength(pass);

}



function generateFun(){

let type=document.getElementById("funType").value;

let list={

science:[
"Atom","Quantum","Photon","Nebula","Cosmos","Electron","Proton","Neutron",
"Galaxy","Nova","Gravity","Fusion","Plasma","Orbit","Satellite","Asteroid",
"Comet","Spectrum","Laser","Photonics"
],

history:[
"Newton","Einstein","Tesla","Darwin","Galileo","Curie","Hawking",
"Archimedes","Aristotle","DaVinci","Napoleon","Cleopatra",
"Alexander","Caesar","Lincoln","Churchill","Mandela","Gandhi",
"Ashoka","Akbar","Shivaji"
],

celebrity:[
"Messi","Ronaldo","Beyonce","Drake","TaylorSwift","Shakira",
"Selena","Ariana","TheRock","TomCruise","Keanu","Zendaya",
"Rihanna","EdSheeran","BrunoMars","JustinBieber",
"Virat","Rohit","Dhoni","Sachin","Kohli","Hardik","Gill",
"Pant","Rahul","Jadeja","Bumrah","Surya"
],

rhymes:[
"FireWire","PowerTower","RocketPocket","MagicLogic",
"SpeedSeed","NightLight","CoolTool","BrightKnight",
"StarCar","DreamStream","QuickTrick","SkyFly",
"BoldGold","BrainTrain","FlashDash"
]

};

let word1=list[type][Math.floor(Math.random()*list[type].length)];

let word2=list[type][Math.floor(Math.random()*list[type].length)];

let pass=word1+word2+Math.floor(Math.random()*100);

document.getElementById("password").value=pass;

addHistory(pass);

updateStrength(pass);

}

</script>

</body>
</html>
